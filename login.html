     <!-- Loader -->
    <div id="loader" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
     
    <div id="login-page" class="container mt-5" style="display: block; width:50%; background-color: var(--chalk-soft);border: 2px solid #e7e9e7;border-radius: 16px;display: flex;flex-direction: column;padding: 40px;">
        <h2 class="text-center">Login</h2>
        <form id="login-form" class="mt-4"  onsubmit="return false">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="xyz@gmail.com" required style="border-radius: 42px;height: 50px;">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="*********" required style="border-radius: 42px;height: 50px;">
            </div>
            <button type="submit" class="w-100 login-btn" id="login-btn">Login</button>
        </form>
    </div>
