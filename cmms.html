<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Country Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="container mt-5" style="display: block;">
        <h2 class="text-center">Login</h2>
        <form id="login-form" class="mt-4">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>

    <!-- Countries Page -->
    <div id="countries-page" class="container mt-5" style="display: none;">
        <h2 class="text-center">Countries</h2>
        <div class="d-flex justify-content-end">
            <button id="add-country-btn" class="btn btn-success">Add New</button>
        </div>
        <div id="countries-container" class="row mt-4">
            <!-- Country Cards Will Be Added Here -->
        </div>
    </div>

    <!-- Add Country Modal -->
    <div class="modal fade" id="addCountryModal" tabindex="-1" aria-labelledby="addCountryModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addCountryModalLabel">Add New Country</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-country-form">
                        <div class="mb-3">
                            <label for="country-name" class="form-label">Country Name</label>
                            <input type="text" class="form-control" id="country-name" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginPage = document.getElementById('login-page');
            const countriesPage = document.getElementById('countries-page');
            const loginForm = document.getElementById('login-form');
            const countriesContainer = document.getElementById('countries-container');
            const addCountryModal = new bootstrap.Modal(document.getElementById('addCountryModal'));
            const addCountryForm = document.getElementById('add-country-form');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch('https://api.example.com/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.countries) {
                            displayCountries(data.countries);
                        }
                        loginPage.style.display = 'none';
                        countriesPage.style.display = 'block';
                    } else {
                        alert('Login failed. Please check your credentials.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            });

            function displayCountries(countries) {
                countriesContainer.innerHTML = '';
                countries.forEach(country => {
                    const card = document.createElement('div');
                    card.className = 'col-md-4';
                    card.innerHTML = `
                        <div class="card mb-3">
                            <div class="card-body">
                                <h5 class="card-title">${country.name}</h5>
                                <p class="card-text">ID: ${country.id}</p>
                            </div>
                        </div>
                    `;
                    countriesContainer.appendChild(card);
                });
            }

            document.getElementById('add-country-btn').addEventListener('click', () => {
                addCountryModal.show();
            });

            addCountryForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const countryName = document.getElementById('country-name').value;

                try {
                    const response = await fetch('https://api.example.com/countries', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: countryName })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const newCountry = { id: data.id, name: countryName };
                        displayCountries([...document.querySelectorAll('#countries-container .card')].map(card => ({
                            id: card.querySelector('.card-text').textContent.split(': ')[1],
                            name: card.querySelector('.card-title').textContent
                        })), newCountry);
                        addCountryModal.hide();
                        addCountryForm.reset();
                    } else {
                        alert('Failed to add country.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            });
        });
    </script>
</body>
</html>
